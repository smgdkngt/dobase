inbox_unread:
  account: primary
  message_id: "<msg-001@example.com>"
  subject: Welcome to Dobase
  from_address: sender@example.com
  from_name: Friendly Sender
  to_addresses: '["testuser@example.com"]'
  body_plain: "Welcome to Dobase! We hope you enjoy the platform."
  body_html: "<p>Welcome to Dobase! We hope you enjoy the platform.</p>"
  folder: INBOX
  read: false
  starred: false
  archived: false
  trashed: false
  thread_id: thread-001
  uid: 101
  sent_at: <%= 1.hour.ago.to_fs(:db) %>
  created_at: <%= Time.current.to_fs(:db) %>
  updated_at: <%= Time.current.to_fs(:db) %>

